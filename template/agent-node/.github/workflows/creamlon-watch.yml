name: Creamlon Watch

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install creamlon CLI
        run: npm link
        working-directory: ${{ github.workspace }}
      - name: Watch pending tasks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: creamlon watch ${{ github.repository_owner }}/${{ github.event.repository.name }} --repo-path . --once --pretty
